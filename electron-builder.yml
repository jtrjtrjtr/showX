appId: cz.xlab.showx
productName: ShowX
copyright: "Copyright © 2026 XLAB s.r.o."

# Extra resources bundled into the app (read-only inside .app/Contents/Resources)
extraResources:
  - from: resources/demo-show
    to: demo-show
    filter:
      - "**/*"

# Patched metadata for the packed app.
# main: the in-asar path (src/main/dist flattened to asar root).
# type: module — the compiled main (index.js) is ESM (`import ...`). Without this the
# packed package.json defaults to CommonJS and Electron throws
# "Cannot use import statement outside a module" at boot. (Root pkg stays type-less for dev.)
#
# IMPORTANT — app-builder-lib drift guard (2026-06-15):
# Older versions of app-builder-lib (and/or certain pnpm lifecycle combinations)
# have been observed writing the extraMetadata patch back to the SOURCE workspace
# root package.json (stripping scripts + devDependencies). The afterAllArtifactBuild
# hook in this file restores package.json from HEAD to guard against this.
# The packageJsonIntegrity unit test catches the regression in CI.
extraMetadata:
  main: index.js
  type: module

# Native addons (.node binaries) must live outside the asar so the OS can dlopen() them.
# Covers @julusian/midi and keytar (and any future native modules).
asarUnpack:
  - "**/*.node"

# Build inputs
# NOTE: package.json is explicitly listed so electron-builder injects it at asar root
# even with a custom from/to mapping (behavior changed in app-builder-lib 24.x).
files:
  - package.json
  - from: src/main/dist
    to: .
    filter:
      - "**/*"
  - from: pwa/dist
    to: pwa
    filter:
      - "**/*"
  # Workspace packages the compiled main imports by bare specifier
  # (@showx/module-cuelist-core/<subpath>, showx-shared). pnpm symlinks don't survive
  # packaging, so mount each package (package.json + dist) under node_modules/<name> so
  # Node ESM resolves them via their exports maps. Lesson: feedback_electron_workspace_imports_packed.
  - from: src/modules/cuelist-core
    to: node_modules/@showx/module-cuelist-core
    filter:
      - package.json
      - dist/**/*
  - from: src/shared
    to: node_modules/showx-shared
    filter:
      - package.json
      - dist/**/*

directories:
  buildResources: build
  output: dist-electron

# afterAllArtifactBuild: restore the workspace root package.json if it was clobbered by
# app-builder-lib's extraMetadata write-back (observed with certain pnpm+electron-builder
# combinations). The script is a no-op if package.json is already at the correct HEAD.
afterAllArtifactBuild: scripts/restore-pkg-after-build.mjs

# macOS target
# For signed release builds: set CSC_NAME env var to the Apple Developer ID cert name
# For unsigned local/CI builds: CSC_IDENTITY_AUTO_DISCOVERY=false (see dist script)
mac:
  category: public.app-category.productivity
  # identity left unset here — controlled by env CSC_NAME for signed builds (B006-002)
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  title: "ShowX ${version}"
  icon: build/icon.icns
  iconSize: 128
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# No auto-update for 0.1 (direct DMG distribution only)
publish: null
