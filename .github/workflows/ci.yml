name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit-tests:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build workspace deps the tests import by bare specifier (@showx/module-cuelist-core/*,
      # showx-shared resolve to dist/ via their exports maps). A clean CI checkout has no dist
      # → "Failed to load url @showx/module-cuelist-core/...". Locally dist exists from prior builds.
      - run: pnpm --filter showx-shared build && pnpm --filter @showx/module-cuelist-core build
      - run: pnpm test -- --coverage --reporter=default --reporter=junit --outputFile.junit=junit-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: |
            coverage/
            junit-unit.xml

  parity-tests:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:parity

  e2e-tests:
    needs: [typecheck]
    runs-on: ubuntu-latest
    # Non-blocking: Electron-GUI E2E on headless Linux CI is WIP (needs the app built +
    # likely xvfb). It runs for signal + uploads the report, but must NOT fail the whole
    # CI run (which would re-trigger failure emails). Promote to blocking once the harness
    # is green in CI. Tracked in CI_FINDINGS_20260614.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # E2E launches the built Electron app (bootTestShell → src/main/dist/index.js).
      - run: pnpm -r build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-playwright-report
          path: playwright-report/

  build:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/main/dist/
            src/shared/dist/
            pwa/dist/
